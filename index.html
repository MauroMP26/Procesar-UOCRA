<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procesador UOCRA 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.7.0/lib/msal-browser.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: #0a0e27;
    color: #e0e6ed;
    padding: 40px 20px;
  }

  .container { max-width: 900px; margin: 0 auto; }

  .header { display: flex; align-items: center; gap: 20px; margin-bottom: 40px; }
  .logo { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
  .logo span { color: #3b82f6; }
  .subtitle { font-size: 12px; color: #64748b; font-family: 'IBM Plex Mono'; }

  .panel {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 14px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #94a3b8;
    margin-bottom: 16px;
    border-bottom: 1px solid #334155;
    padding-bottom: 12px;
  }

  .control-group {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #cbd5e1;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  input[type="file"],
  input[type="text"],
  select {
    width: 100%;
    padding: 10px 12px;
    background: #0f172a;
    border: 1px solid #475569;
    border-radius: 4px;
    color: #e0e6ed;
    font-family: 'IBM Plex Mono';
    font-size: 13px;
  }

  input[type="file"]::file-selector-button {
    padding: 6px 12px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 3px;
    cursor: pointer;
    font-weight: 600;
    margin-right: 8px;
  }

  button {
    padding: 12px 24px;
    background: #3b82f6;
    border: none;
    border-radius: 6px;
    color: white;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
  }

  button:hover { background: #2563eb; }
  button:disabled { background: #64748b; cursor: not-allowed; }

  .log {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 4px;
    padding: 12px;
    font-family: 'IBM Plex Mono';
    font-size: 12px;
    max-height: 220px;
    overflow-y: auto;
    margin-top: 16px;
  }

  .log-item { padding: 4px 0; line-height: 1.4; }
  .log-ok   { color: #22c55e; }
  .log-err  { color: #ef4444; }
  .log-info { color: #64b5f6; }
  .log-warn { color: #f59e0b; }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 20px;
  }

  .result-card {
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 4px;
    padding: 16px;
    text-align: center;
  }

  .result-sheet {
    font-size: 12px;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
  }

  .result-count {
    font-size: 28px;
    font-weight: 700;
    color: #3b82f6;
  }

  .dl-btn {
    width: 100%;
    margin-top: 12px;
    padding: 8px;
    font-size: 12px;
    background: #10b981;
  }
  .dl-btn:hover { background: #059669; }

  .dl-all-btn {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    font-size: 13px;
    background: #8b5cf6;
  }
  .dl-all-btn:hover { background: #7c3aed; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="logo">UOCRA<span>/2026</span></div>
      <div class="subtitle">// Extrae ZM02 · ZM03 · ZM04 · PM05 desde partes UOCRA</div>
    </div>
  </div>

  <div class="panel">
    <div class="section-title">Parámetros</div>
    <div class="control-group">
      <div>
        <label>Sector</label>
        <select id="sector">
          <option value="ld">L&D</option>
          <option value="obras">OBRAS</option>
          <option value="infra">INFRA</option>
        </select>
      </div>
      <div>
        <label>Mes</label>
        <select id="inputMes">
          <option value="1">Enero</option>
          <option value="2">Febrero</option>
          <option value="3">Marzo</option>
          <option value="4">Abril</option>
          <option value="5" selected>Mayo</option>
          <option value="6">Junio</option>
          <option value="7">Julio</option>
          <option value="8">Agosto</option>
          <option value="9">Septiembre</option>
          <option value="10">Octubre</option>
          <option value="11">Noviembre</option>
          <option value="12">Diciembre</option>
        </select>
      </div>
      <div>
        <label>Año</label>
        <input type="text" id="inputAnio" value="2026" placeholder="ej: 2026">
      </div>
      <div>
        <label>Quincena</label>
        <select id="quincena">
          <option value="1">1ra (días 1–15)</option>
          <option value="2">2da (días 16–31)</option>
        </select>
      </div>
    </div>

    <div style="margin-bottom: 16px; padding: 16px; background: #0f172a; border: 1px solid #334155; border-radius: 6px;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <label style="margin:0;">SharePoint</label>
        <span id="msalStatus" style="font-size:11px; color:#64748b; font-family:'IBM Plex Mono';">No conectado</span>
      </div>
      <button id="btnConectarMS" onclick="loginMicrosoft()" style="background:#0078d4; margin-bottom:10px;">⊞ CONECTAR CON MICROSOFT</button>
      <div id="spPickerWrap" style="display:none;">
        <input type="text" id="spSearch" placeholder="Buscar archivo en SharePoint..." style="margin-bottom:8px;">
        <button onclick="buscarArchivosSP()" style="background:#475569;">BUSCAR</button>
        <div id="spResults" style="margin-top:10px;"></div>
      </div>
    </div>

    <div style="text-align:center; color:#475569; font-size:11px; margin: 12px 0; font-family:'IBM Plex Mono';">— o —</div>

    <div style="margin-bottom: 16px;">
      <label>Archivo Excel (.xlsm / .xlsx)</label>
      <input type="file" id="fileInput" accept=".xlsm,.xlsx">
    </div>

    <button onclick="procesarArchivo()" id="btnProcesar">PROCESAR</button>

    <div class="log" id="log">
      <div class="log-item log-info">// Conectate a SharePoint o subí un archivo, después presioná PROCESAR</div>
    </div>
  </div>

  <div id="results"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CONFIGURACIÓN MICROSOFT GRAPH / SHAREPOINT
// ═══════════════════════════════════════════════════════════════════
const msalConfig = {
  auth: {
    clientId: "e35d0be8-3efe-4e07-a14d-5b184f565771",
    authority: "https://login.microsoftonline.com/8cb3c63f-2956-4d28-b216-acb701237c25",
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: {
    cacheLocation: "sessionStorage"
  }
};

const msalScopes = ["Files.Read.All", "Sites.Read.All", "User.Read"];
let msalInstance = null;
let msalAccount = null;

async function initMsal() {
  try {
    if (typeof msal === 'undefined') {
      console.error('MSAL.js no se cargó desde el CDN');
      const status = document.getElementById('msalStatus');
      if (status) { status.textContent = '⚠ Librería no cargó'; status.style.color = '#ef4444'; }
      return;
    }
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();
    const response = await msalInstance.handleRedirectPromise();
    if (response) {
      msalAccount = response.account;
    } else {
      const accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) msalAccount = accounts[0];
    }
    actualizarEstadoMS();
  } catch (err) {
    console.error('Error iniciando MSAL:', err);
    const status = document.getElementById('msalStatus');
    if (status) { status.textContent = '⚠ Error de inicialización'; status.style.color = '#ef4444'; }
  }
}

function actualizarEstadoMS() {
  const status = document.getElementById('msalStatus');
  const picker = document.getElementById('spPickerWrap');
  const btn = document.getElementById('btnConectarMS');
  if (msalAccount) {
    status.textContent = `✓ ${msalAccount.username}`;
    status.style.color = '#22c55e';
    picker.style.display = 'block';
    btn.textContent = '⊞ RECONECTAR';
  } else {
    status.textContent = 'No conectado';
    status.style.color = '#64748b';
    picker.style.display = 'none';
  }
}

async function loginMicrosoft() {
  if (!msalInstance) {
    log('❌ MSAL todavía no terminó de inicializar. Esperá unos segundos y probá de nuevo, o recargá la página (F5).', 'err');
    return;
  }
  try {
    const result = await msalInstance.loginPopup({ scopes: msalScopes });
    msalAccount = result.account;
    actualizarEstadoMS();
    log('✓ Conectado a Microsoft como ' + msalAccount.username, 'ok');
  } catch (err) {
    log('❌ Error al conectar: ' + err.message, 'err');
  }
}

async function getGraphToken() {
  try {
    const result = await msalInstance.acquireTokenSilent({ scopes: msalScopes, account: msalAccount });
    return result.accessToken;
  } catch (err) {
    const result = await msalInstance.acquireTokenPopup({ scopes: msalScopes });
    return result.accessToken;
  }
}

async function buscarArchivosSP() {
  const query = document.getElementById('spSearch').value.trim();
  if (!query) {
    log('❌ Escribí un nombre de archivo para buscar', 'err');
    return;
  }
  const resultsDiv = document.getElementById('spResults');
  resultsDiv.innerHTML = '<div style="font-size:12px; color:#64748b;">Buscando...</div>';

  try {
    const token = await getGraphToken();
    const url = `https://graph.microsoft.com/v1.0/me/drive/root/search(q='${encodeURIComponent(query)}')`;
    const res = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
    const data = await res.json();

    if (!data.value || data.value.length === 0) {
      resultsDiv.innerHTML = '<div style="font-size:12px; color:#f59e0b;">Sin resultados. Probá buscar también en sitios de SharePoint (no solo OneDrive).</div>';
      return;
    }

    resultsDiv.innerHTML = '';
    data.value
      .filter(f => f.name.match(/\.(xlsm|xlsx)$/i))
      .forEach(file => {
        const item = document.createElement('div');
        item.style.cssText = 'padding:8px; background:#1e293b; border:1px solid #334155; border-radius:4px; margin-bottom:6px; cursor:pointer; font-size:12px; font-family:IBM Plex Mono;';
        item.textContent = `📄 ${file.name}`;
        item.onclick = () => seleccionarArchivoSP(file, token);
        resultsDiv.appendChild(item);
      });

    if (resultsDiv.innerHTML === '') {
      resultsDiv.innerHTML = '<div style="font-size:12px; color:#f59e0b;">No se encontraron archivos .xlsm/.xlsx con ese nombre</div>';
    }
  } catch (err) {
    resultsDiv.innerHTML = '';
    log('❌ Error buscando en SharePoint: ' + err.message, 'err');
  }
}

async function seleccionarArchivoSP(file, token) {
  log(`✓ Descargando "${file.name}" desde SharePoint...`, 'info');
  try {
    const res = await fetch(file['@microsoft.graph.downloadUrl'] || `https://graph.microsoft.com/v1.0/me/drive/items/${file.id}/content`, {
      headers: file['@microsoft.graph.downloadUrl'] ? {} : { Authorization: `Bearer ${token}` }
    });
    const buffer = await res.arrayBuffer();
    workbook = XLSX.read(buffer, { type: 'array', cellDates: false, cellNF: true });
    log(`✓ Archivo cargado desde SharePoint: ${file.name}`, 'ok');
    log(`  Hojas: ${workbook.SheetNames.join(', ')}`, 'info');
    document.getElementById('spResults').innerHTML = `<div style="font-size:12px; color:#22c55e;">✓ ${file.name} cargado</div>`;
  } catch (err) {
    log('❌ Error al descargar el archivo: ' + err.message, 'err');
  }
}

window.addEventListener('load', initMsal);

// ═══════════════════════════════════════════════════════════════════
// PROCESADOR (lo de siempre)
// ═══════════════════════════════════════════════════════════════════
let workbook = null;
let outputSheets = {};

// ─── Utilidades ────────────────────────────────────────────────────────────────

function log(msg, type = 'info') {
  const logEl = document.getElementById('log');
  const item = document.createElement('div');
  item.className = `log-item log-${type}`;
  item.textContent = msg;
  logEl.appendChild(item);
  logEl.scrollTop = logEl.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

function fechaDeCell(cell) {
  if (!cell) return null;
  let v = cell.v;
  // Si es número (serial Excel)
  if (typeof v === 'number') {
    const d = XLSX.SSF.parse_date_code(v);
    if (!d) return null;
    return new Date(d.y, d.m - 1, d.d);
  }
  // Si ya es Date
  if (v instanceof Date) return v;
  // Si es string — manejar d/m/yyyy y variantes
  if (typeof v === 'string') {
    const s = v.trim();
    const m1 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (m1) return new Date(parseInt(m1[3]), parseInt(m1[2])-1, parseInt(m1[1]));
    const m2 = s.match(/^(\d{1,2})-(\d{1,2})-(\d{4})$/);
    if (m2) return new Date(parseInt(m2[3]), parseInt(m2[2])-1, parseInt(m2[1]));
    const m3 = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (m3) return new Date(parseInt(m3[1]), parseInt(m3[2])-1, parseInt(m3[3]));
    const parsed = new Date(s);
    if (!isNaN(parsed)) return parsed;
  }
  return null;
}

function formatFecha(date) {
  return `${String(date.getDate()).padStart(2,'0')}.${String(date.getMonth()+1).padStart(2,'0')}.${date.getFullYear()}`;
}

// ─── Carga de archivo ──────────────────────────────────────────────────────────

document.getElementById('fileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      workbook = XLSX.read(ev.target.result, { type: 'array', cellDates: false, cellNF: true });
      clearLog();
      log(`✓ Archivo cargado: ${file.name}`, 'ok');
      log(`  Hojas: ${workbook.SheetNames.join(', ')}`, 'info');
    } catch(err) {
      log(`❌ Error al leer el archivo: ${err.message}`, 'err');
    }
  };
  reader.readAsArrayBuffer(file);
});

// ─── Procesamiento principal ───────────────────────────────────────────────────

function procesarArchivo() {
  clearLog();

  if (!workbook) {
    log('❌ Cargá un archivo primero', 'err');
    return;
  }

  const mesNum    = parseInt(document.getElementById('inputMes').value);
  const anio      = parseInt(document.getElementById('inputAnio').value);
  const quincena  = parseInt(document.getElementById('quincena').value);
  const sector    = document.getElementById('sector').value;

  if (isNaN(anio)) {
    log('❌ Año inválido', 'err');
    return;
  }

  const diaMin = quincena === 1 ? 1 : 16;
  const diaMax = quincena === 1 ? 15 : 31;

  log(`▶ Sector: ${sector.toUpperCase()} | ${mesNum}/${anio} | ${quincena}ra quincena`, 'ok');

  // Buscar hoja VARIABLES
  const wsName = workbook.SheetNames.find(n => n.trim().toUpperCase() === 'VARIABLES');
  if (!wsName) {
    log('❌ No se encontró la hoja VARIABLES', 'err');
    log(`  Hojas disponibles: ${workbook.SheetNames.join(', ')}`, 'warn');
    return;
  }

  const ws = workbook.Sheets[wsName];
  const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');
  const totalCols = range.e.c;

  log(`  Hoja VARIABLES encontrada. Columnas totales: ${totalCols + 1}`, 'info');

  // ── Paso 1: Escanear fila 16 (índice 15) buscando fechas del período ──────────
  // Las fechas arrancan en alguna columna y se repiten de a 4 (HA, V, HH, HE)
  // Buscamos TODAS las columnas cuya fecha coincida con mes/año/quincena

  const columnasFecha = []; // { colIdx, fecha, fechaStr }

  for (let c = 0; c <= totalCols; c++) {
    const cell = ws[XLSX.utils.encode_cell({ r: 15, c })];
    if (!cell) continue;

    const fecha = fechaDeCell(cell);
    if (!fecha) continue;

    const d = fecha.getDate();
    const m = fecha.getMonth() + 1;
    const y = fecha.getFullYear();

    if (m === mesNum && y === anio && d >= diaMin && d <= diaMax) {
      columnasFecha.push({
        colIdx: c,
        fecha,
        fechaStr: formatFecha(fecha)
      });
    }
  }

  if (columnasFecha.length === 0) {
    log(`❌ No se encontraron fechas para ${mesNum}/${anio} quincena ${quincena}`, 'err');
    log(`  Revisá que la fila 16 tenga fechas en ese rango`, 'warn');
    // Diagnóstico: mostrar primeras 5 celdas con valor en fila 16
    log(`  Diagnóstico fila 16:`, 'warn');
    let diag = 0;
    for (let c = 0; c <= Math.min(totalCols, 800); c++) {
      const cell = ws[XLSX.utils.encode_cell({ r: 15, c })];
      if (cell && cell.v !== undefined && cell.v !== '') {
        log(`    col ${c+1} (${XLSX.utils.encode_col(c)}): tipo=${typeof cell.v} val="${cell.v}"`, 'warn');
        diag++;
        if (diag >= 8) break;
      }
    }
    return;
  }

  log(`✓ Fechas encontradas: ${columnasFecha.length} (cols ${columnasFecha[0].colIdx+1}–${columnasFecha[columnasFecha.length-1].colIdx+1})`, 'ok');
  log(`  Rango: ${columnasFecha[0].fechaStr} → ${columnasFecha[columnasFecha.length-1].fechaStr}`, 'info');
  // Diagnóstico: mostrar primeras 3 fechas detectadas con su colIdx
  columnasFecha.slice(0, 3).forEach(f => {
    log(`  → ${f.fechaStr} en col ${f.colIdx+1} (${XLSX.utils.encode_col(f.colIdx)})`, 'info');
  });

  // ── Paso 2: Recorrer legajos (fila 18 en adelante, col B = índice 1) ──────────
  // Estructura por fecha: colIdx+0=HA, colIdx+1=V, colIdx+2=HH, colIdx+3=HE
  // La fecha puede aparecer en las 4 celdas → deduplicar quedándose solo con
  // la primera ocurrencia de cada fecha (columnasFecha ya ordenado por colIdx)

  const zm02 = []; // HA  – altura     (puede ser > 1)
  const zm03 = []; // V   – vianda     (siempre 1)
  const zm04 = []; // HH  – hormigón   (puede ser > 1)
  const pm05 = []; // HE  – hs extras  (puede ser > 1)

  // Deduplicar: si la misma fecha aparece en columnas contiguas, quedarse
  // solo con la primera (la del HA). Tomamos la de menor colIdx por fecha.
  const fechasDedup = [];
  const vistas = new Set();
  for (const item of columnasFecha) {
    if (!vistas.has(item.fechaStr)) {
      vistas.add(item.fechaStr);
      fechasDedup.push(item);
    }
  }

  log(`  Fechas únicas tras deduplicar: ${fechasDedup.length}`, 'info');

  let legajosEncontrados = 0;

  for (let r = 17; r <= range.e.r; r++) {
    const legajoCell = ws[XLSX.utils.encode_cell({ r, c: 1 })];
    if (!legajoCell) continue;

    const legajo = parseInt(legajoCell.v);
    if (isNaN(legajo) || legajo <= 0) continue;

    legajosEncontrados++;
    let cnt02 = 0, cnt03 = 0, cnt04 = 0, cnt05 = 0;

    for (const { colIdx, fechaStr } of fechasDedup) {
      // colIdx+0=HA, +1=V, +2=HH, +3=HE
      const haCell  = ws[XLSX.utils.encode_cell({ r, c: colIdx })];
      const vCell   = ws[XLSX.utils.encode_cell({ r, c: colIdx + 1 })];
      const hhCell  = ws[XLSX.utils.encode_cell({ r, c: colIdx + 2 })];
      const heCell  = ws[XLSX.utils.encode_cell({ r, c: colIdx + 3 })];

      const ha  = haCell  ? Number(haCell.v)  : 0;
      const v   = vCell   ? Number(vCell.v)   : 0;
      const hh  = hhCell  ? Number(hhCell.v)  : 0;
      const he  = heCell  ? Number(heCell.v)  : 0;

      const legSAP = legajo + 40000000;
      const fila   = [legajo, legSAP, fechaStr, fechaStr];

      if (ha > 0)  { zm02.push([...fila, 'ZM02', '', '', ha]); cnt02++; }
      if (v  == 1) { zm03.push([...fila, 'ZM03', '', '', 1]);  cnt03++; }
      if (hh > 0)  { zm04.push([...fila, 'ZM04', '', '', hh]); cnt04++; }
      if (he > 0)  { pm05.push([...fila, 'PM05', '', '', he]); cnt05++; }
    }

    const total = cnt02 + cnt03 + cnt04 + cnt05;
    if (total > 0) {
      log(`  Leg ${legajo}: HA=${cnt02} V=${cnt03} HH=${cnt04} HE=${cnt05}`, 'info');
    }
  }

  log(`──────────────────────────────`, 'info');
  log(`✓ Legajos procesados: ${legajosEncontrados}`, 'ok');
  log(`✓ ZM02 (Altura):    ${zm02.length} líneas`, 'ok');
  log(`✓ ZM03 (Vianda):    ${zm03.length} líneas`, 'ok');
  log(`✓ ZM04 (Hormigón):  ${zm04.length} líneas`, 'ok');
  log(`✓ PM05 (Hs Extras): ${pm05.length} líneas`, 'ok');

  const HDR = ['LEG GV', 'LEG SAP', 'F1', 'F2', 'CLASE', '', '', 'CANTIDAD'];

  outputSheets = {
    'ZM02_ALTURA':   { headers: HDR, rows: zm02 },
    'ZM03_VIANDAS':  { headers: HDR, rows: zm03 },
    'ZM04_HORMIGON': { headers: HDR, rows: zm04 },
    'PM05_HS_EXTRAS':{ headers: HDR, rows: pm05 },
  };

  mostrarResultados(sector, mesNum, anio, quincena);
}

// ─── UI de resultados ──────────────────────────────────────────────────────────

function mostrarResultados(sector, mes, anio, quincena) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  const grid = document.createElement('div');
  grid.className = 'results-grid';

  for (const [name, data] of Object.entries(outputSheets)) {
    const card = document.createElement('div');
    card.className = 'result-card';
    card.innerHTML = `
      <div class="result-sheet">${name.replace('_', ' ')}</div>
      <div class="result-count">${data.rows.length}</div>
      <div style="font-size:11px;color:#64748b;margin-top:4px;">líneas</div>
      <button class="dl-btn" onclick="descargarHoja('${name}','${sector}')">↓ DESCARGAR</button>
    `;
    grid.appendChild(card);
  }

  container.appendChild(grid);

  const dlAll = document.createElement('button');
  dlAll.className = 'dl-all-btn';
  dlAll.textContent = '↓ DESCARGAR TODO (archivo único)';
  dlAll.onclick = () => descargarTodo(sector, mes, anio, quincena);
  container.appendChild(dlAll);

  log('✓ Listo para descargar', 'ok');
}

function descargarHoja(name, sector) {
  const { headers, rows } = outputSheets[name];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
  XLSX.utils.book_append_sheet(wb, ws, name.substring(0, 31));
  XLSX.writeFile(wb, `UOCRA_${name}_${sector.toUpperCase()}.xlsx`);
}

function descargarTodo(sector, mes, anio, quincena) {
  const wb = XLSX.utils.book_new();
  for (const [name, { headers, rows }] of Object.entries(outputSheets)) {
    const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
    XLSX.utils.book_append_sheet(wb, ws, name.substring(0, 31));
  }
  const q = quincena === 1 ? 'Q1' : 'Q2';
  XLSX.writeFile(wb, `UOCRA_${sector.toUpperCase()}_${mes}-${anio}_${q}.xlsx`);
}
</script>
